<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNI-Versity | Admin Account Requests</title>
<link rel="stylesheet" href="/css/global.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/images/logo.png" alt="UNI-Versity" style="width:36px;height:36px;border-radius:10px;object-fit:cover;"/>
      <div class="brand">UNI<span style="color:#A78BFA">–</span>Versity</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/admin/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="/admin/masterlist.html"><span class="nav-icon">👥</span> Trainee Master List</a>
      <a class="nav-item" href="/admin/attendance.html"><span class="nav-icon">✅</span> Attendance Requests</a>
      <a class="nav-item active" href="/admin/requests.html"><span class="nav-icon">📨</span> Admin Requests</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar-placeholder" style="background:linear-gradient(135deg,#F59E0B,#EF4444);">A</div>
        <div class="sidebar-user-info"><div class="name">Administrator</div><div class="role">Admin</div></div>
      </div>
      <button onclick="logout()" class="btn btn-secondary btn-full btn-sm" style="margin-top:.75rem;">🚪 Log Out</button>
    </div>
  </aside>

  <main class="main-content">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="topbar">
      <div class="topbar-left"><h1>📨 Admin Account Requests</h1><p>Approve or deny new admin registrations.</p></div>
      <div class="topbar-right"><button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><span class="theme-icon">??</span></button><div id="datetime-display" class="datetime-badge"></div></div>
    </div>
    <div class="quote-banner mb-3">
      <span class="quote-icon">🛠️</span><p id="quote-text" class="quote-text">Loading quote...</p>
    </div>
    <div id="request-cards" style="display:flex;flex-direction:column;gap:1rem;"></div>
  </main>
</div>

<script src="/js/utils.js"></script>
<script>
async function loadAdminRequests() {
  const list = await api.get('/api/admin/admin-requests');
  const container = document.getElementById('request-cards');
  if (!list || !list.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📨</div><p>No pending admin requests.</p></div>';
    return;
  }
  container.innerHTML = list.map(r => `
    <div class="card fade-in" id="req-card-${r.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
        <div>
          <div class="font-bold" style="font-size:1rem;">${r.name}</div>
          <div class="text-sm text-muted">${r.email}</div>
          <div style="margin-top:.5rem;display:flex;flex-direction:column;gap:.25rem;font-size:.82rem;">
            <span>🪪 ID: <strong>${r.idNumber}</strong></span>
            <span>🏫 Institute: <strong>${r.institute.replace(/_/g,' ')}</strong></span>
            <span>📅 Requested: ${new Date(r.requestedAt).toLocaleDateString('en-PH',{month:'long',day:'numeric',year:'numeric'})}</span>
          </div>
        </div>
        <div style="display:flex;gap:.5rem;">
          <button class="btn btn-success btn-sm" onclick="reviewRequest(${r.id},true)">✓ Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reviewRequest(${r.id},false)">✗ Deny</button>
        </div>
      </div>
    </div>`).join('');
}

async function reviewRequest(id, approve) {
  const url = approve ? `/api/admin/admin-requests/${id}/approve` : `/api/admin/admin-requests/${id}/deny`;
  const data = await api.post(url, {});
  if (!data) return;
  showToast(data.message, approve ? 'success' : 'warning');
  const card = document.getElementById(`req-card-${id}`);
  if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .3s'; setTimeout(() => card.remove(), 300); }
}

loadAdminRequests();
</script>
</body>
</html>
