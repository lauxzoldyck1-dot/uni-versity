<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNI-Versity | Reset Password</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);">
  <div id="toast-container"></div>
  
  <div class="auth-card fade-in" style="width:100%;max-width:400px;padding:2rem;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="/assets/images/logo.png" alt="Logo" style="width:60px;height:60px;border-radius:12px;margin-bottom:1rem;"/>
      <h2 style="font-size:1.5rem;font-weight:700;">Reset Password</h2>
      <p style="color:var(--text-muted);font-size:.9rem;margin-top:.5rem;">Create a new password for your account.</p>
    </div>

    <form id="form-reset-password" onsubmit="submitResetPassword(event)">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-pw-wrap">
          <input type="password" id="reset-password" class="form-control" required placeholder="••••••••" minlength="6" />
          <button type="button" class="pw-toggle" onclick="togglePw('reset-password',this)">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="input-pw-wrap">
          <input type="password" id="reset-confirm-password" class="form-control" required placeholder="••••••••" minlength="6" />
          <button type="button" class="pw-toggle" onclick="togglePw('reset-confirm-password',this)">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-reset-password">Save New Password</button>
    </form>
    
    <div style="text-align:center;margin-top:1.5rem;">
      <a href="/" style="color:var(--primary);font-size:.85rem;">← Back to Login</a>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    async function submitResetPassword(e) {
      e.preventDefault();
      const pw = document.getElementById('reset-password').value;
      const cpw = document.getElementById('reset-confirm-password').value;
      
      if (pw !== cpw) {
        showToast('Passwords do not match!', 'error');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        showToast('Invalid or missing reset token.', 'error');
        return;
      }

      const btn = document.getElementById('btn-reset-password');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      const data = await api.post('/api/auth/reset-password', { token, newPassword: pw });

      btn.textContent = 'Save New Password';
      btn.disabled = false;

      if (!data) return;
      if (data.error) {
        showToast(data.error, 'error');
        return;
      }

      showToast(data.message, 'success');
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }
  </script>
</body>
</html>
