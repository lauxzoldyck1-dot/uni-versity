<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNI-Versity | Attendance Requests</title>
<link rel="stylesheet" href="/css/global.css"/>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/images/logo.png" alt="UNI-Versity" style="width:36px;height:36px;border-radius:10px;object-fit:cover;"/>
      <div class="brand">UNI<span style="color:#A78BFA">—</span>Versity</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/superadmin/dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item" href="/superadmin/masterlist.html"><span class="nav-icon">👥</span> Trainee Master List</a>
      <a class="nav-item active" href="/superadmin/attendance.html"><span class="nav-icon">✅</span> Attendance Requests</a>
      <a class="nav-item" href="/superadmin/requests.html"><span class="nav-icon">📨</span> Admin Requests</a>
      <a class="nav-item" href="/superadmin/sa-requests.html"><span class="nav-icon">🛡️</span> SA Applications</a>
      <a class="nav-item" href="/superadmin/confidential.html"><span class="nav-icon">🔒</span> Confidential Records</a>
      <a class="nav-item" href="/superadmin/reports.html"><span class="nav-icon">📈</span> Overall Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar-placeholder" style="background:linear-gradient(135deg,#EF4444,#6C3CE1);">SA</div>
        <div class="sidebar-user-info"><div class="name">Super Admin</div><div class="role">SuperAdmin</div></div>
      </div>
      <button onclick="logout()" class="btn btn-secondary btn-full btn-sm" style="margin-top:.75rem;">🚪 Log Out</button>
    </div>
  </aside>

  <main class="main-content">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="topbar">
      <div class="topbar-left"><h1>✅ Attendance Requests</h1><p>Review and approve student clock-in records.</p></div>
      <div class="topbar-right"><button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><span class="theme-icon">🌙</span></button><div id="datetime-display" class="datetime-badge"></div></div>
    </div>
    <div class="quote-banner mb-3">
      <span class="quote-icon">⏰</span><p id="quote-text" class="quote-text">Loading quote...</p>
    </div>

    <div id="attendance-cards" style="display:flex;flex-direction:column;gap:1rem;"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-photo">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <div class="modal-title">📷 Attendance Photo Review</div>
      <div class="modal-close" onclick="closeModal('modal-photo')">✕</div>
    </div>
    <div id="photo-viewer-content"></div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
async function loadAttendanceRequests() {
  const list = await api.get('/api/admin/attendance/pending');
  const container = document.getElementById('attendance-cards');
  if (!list || !list.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>No pending attendance requests.</p></div>';
    return;
  }
  container.innerHTML = list.map(r => `
    <div class="card fade-in" id="att-card-${r.id}">
      <div style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;">
        <div style="flex-shrink:0;cursor:pointer;" onclick='viewPhoto(${JSON.stringify({id:r.id,name:r.studentName,date:r.workDate,clockIn:r.clockInTime,clockOut:r.clockOutTime,hours:r.hours,clockInPhoto:r.clockInPhoto,studentPhoto:r.studentPhoto}).replace(/'/g,"&#39;")})'>
          ${r.clockInPhoto
            ? `<img src="/uploads/${r.clockInPhoto}" style="width:90px;height:90px;border-radius:var(--radius);object-fit:cover;border:2px solid var(--border2);transition:transform .2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" alt="Clock-in photo"/>`
            : `<div style="width:90px;height:90px;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2rem;border:2px solid var(--border);">📷</div>`}
          <div class="text-xs text-muted" style="text-align:center;margin-top:.3rem;">Click to view</div>
        </div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;">
            ${r.studentPhoto ? `<img src="/uploads/${r.studentPhoto}" class="avatar avatar-sm" alt="${r.studentName}"/>` : `<div class="avatar-placeholder avatar-sm">${getInitials(r.studentName)}</div>`}
            <div>
              <div class="font-bold">${r.studentName}</div>
              <div class="text-xs text-muted">Work Date: ${new Date(r.workDate).toLocaleDateString('en-PH',{weekday:'short',month:'long',day:'numeric',year:'numeric'})}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.82rem;margin-bottom:1rem;">
            <div><span class="text-muted">Clock In:</span> <strong>${r.clockInTime ? new Date(r.clockInTime).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}) : '—'}</strong></div>
            <div><span class="text-muted">Clock Out:</span> <strong>${r.clockOutTime ? new Date(r.clockOutTime).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}) : 'Not yet'}</strong></div>
            <div><span class="text-muted">Hours:</span> <strong>${r.hours ? parseFloat(r.hours).toFixed(2) + ' hrs' : '—'}</strong></div>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <button class="btn btn-success btn-sm" onclick="reviewAttendance(${r.id},true,false)">✔ Approve</button>
            <button class="btn btn-warning btn-sm" onclick="reviewAttendance(${r.id},true,true)">⏰ Approve (Late)</button>
            <button class="btn btn-danger btn-sm" onclick="reviewAttendance(${r.id},false,false)">✗ Deny</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function viewPhoto(data) {
  const content = document.getElementById('photo-viewer-content');
  content.innerHTML = `
    <div class="photo-viewer">
      <div style="flex:1;min-width:200px;">
        <h4 style="margin-bottom:.5rem;">📸 Clock-In Photo</h4>
        ${data.clockInPhoto
          ? `<img src="/uploads/${data.clockInPhoto}" class="photo-viewer-img" style="width:100%;max-height:400px;object-fit:contain;" alt="Clock-in" onclick="this.classList.toggle('zoomed')"/>`
          : '<div class="empty-state" style="padding:2rem;"><p>No photo submitted</p></div>'}
      </div>
      ${data.studentPhoto ? `
      <div style="text-align:center;">
        <h4 style="margin-bottom:.5rem;">👤 Profile Photo</h4>
        <img src="/uploads/${data.studentPhoto}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--border2);" alt="Profile"/>
      </div>` : ''}
    </div>
    <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);">
      <div class="font-bold" style="font-size:1.1rem;margin-bottom:.5rem;">${data.name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.85rem;color:var(--text-muted);">
        <div>📅 ${new Date(data.date).toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
        <div>⏱ ${data.clockIn ? new Date(data.clockIn).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}) : '—'} → ${data.clockOut ? new Date(data.clockOut).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true}) : 'Not yet'}</div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem;">
        <button class="btn btn-success btn-sm" onclick="reviewAttendance(${data.id},true,false);closeModal('modal-photo')">✔ Approve</button>
        <button class="btn btn-warning btn-sm" onclick="reviewAttendance(${data.id},true,true);closeModal('modal-photo')">⏰ Late</button>
        <button class="btn btn-danger btn-sm" onclick="reviewAttendance(${data.id},false,false);closeModal('modal-photo')">✗ Deny</button>
      </div>
    </div>`;
  openModal('modal-photo');
}

async function reviewAttendance(id, approve, isLate) {
  const url = approve ? `/api/admin/attendance/${id}/approve?isLate=${isLate}` : `/api/admin/attendance/${id}/deny`;
  const data = await api.post(url, {});
  if (!data) return;
  showToast(data.message, approve ? 'success' : 'warning');
  const card = document.getElementById(`att-card-${id}`);
  if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .3s'; setTimeout(() => card.remove(), 300); }
}

loadAttendanceRequests();
</script>
</body>
</html>
